<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antojitos — Pedido</title>
<link rel="stylesheet" href="../css/style.css">
</head>



<body>

<h1>🌮 Antojitos</h1>


<div id="productos-container"></div>

<div class="carrito">
    <h2>Carrito</h2>
    <div id="carrito-items"></div>
    <div id="total">Total: $0</div>
</div>

<form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="text" id="direccion" placeholder="Dirección" required>
    <select id="pago" required>
        <option value="">Método de pago</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
    </select>
    <button type="submit">Enviar pedido por WhatsApp</button>
</form>

<div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="../img/cartacalaca/antojitos.jpeg" class="d-block w-100" alt="menu png de la carta. antojitos">
    </div>
    <div class="carousel-item">
      <img src="../img/cartacalaca/botanas.jpeg" class="d-block w-100" alt="menu png de la carta. Botanas">
    </div>
    <div class="carousel-item">
      <img src="../img/cartacalaca/rellenos.jpeg" class="d-block w-100" alt="menu png de la carta. Rellenos">
    </div>
  </div>
  <div class="carousel-item">
      <img src="../img/cartacalaca/bebidas.jpeg" class="d-block w-100" alt="menu png de la carta. Bebidas">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Siguiente</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
</div>


<script src="../Javascript/antojitos.js"></script>
</body>
</html>
