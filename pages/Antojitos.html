<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antojitos — Pedido</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>



<body>

<h1>🌮 Antojitos</h1>


<div id="productos-container"></div>

<div class="carrito">
    <h2>Carrito</h2>
    <div id="carrito-items"></div>
    <div id="total">Total: $0</div>
</div>

<form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="text" id="direccion" placeholder="Dirección" required>
    <select id="pago" required>
        <option value="">Método de pago</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
    </select>
    <button type="submit">Enviar pedido por WhatsApp</button>
</form>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="../img/cartacalaca/antojitos.jpeg" class="d-block w-100" alt="menu antojitos">
    </div>

    <div class="carousel-item">
      <img src="../img/cartacalaca/botanas.jpeg" class="d-block w-100" alt="menu botanas">
    </div>

    <div class="carousel-item">
      <img src="../img/cartacalaca/rellenos.jpeg" class="d-block w-100" alt="menu rellenos">
    </div>

    <div class="carousel-item">
      <img src="../img/cartacalaca/bebidas.jpeg" class="d-block w-100" alt="menu bebidas">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../Javascript/antojitos.js"></script>
</body>
</html>
